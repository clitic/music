name: deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  YT_API_KEY: ${{ secrets.YT_API_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Create or switch to gh-pages branch
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

      - name: Copy frontend files from main
        run: |
          git checkout main -- index.html src/

      - name: Install and run music
        run: |
          cargo install --git https://github.com/clitic/music
          /home/runner/.cargo/bin/music

      - name: Commit and push
        run: |
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "automatic deploy"
          git push origin gh-pages
